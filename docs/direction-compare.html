<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>几里造物 — 三个视觉方向</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f3; color: #0d0d0d; }
    .compare { display: grid; gap: 32px; padding: 48px; max-width: 1800px; margin: 0 auto; }
    .label { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin-bottom: 12px; }
    .frame { aspect-ratio: 16/9; background: #fff; border: 1px solid rgba(0,0,0,0.06); overflow: hidden; position: relative; }

    /* Direction A: Typography Monument */
    .dir-a { display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fafaf8; }
    .dir-a .brand { font-family: 'Noto Serif SC', serif; font-size: clamp(80px, 14vw, 200px); line-height: 0.9; font-weight: 900; letter-spacing: -0.02em; text-align: center; }
    .dir-a .brand .solid { color: #0d0d0d; }
    .dir-a .brand .outline { color: transparent; -webkit-text-stroke: 1.5px rgba(13,13,13,0.85); }
    .dir-a .tagline { margin-top: 48px; font-size: 16px; letter-spacing: 0.3em; color: rgba(13,13,13,0.45); text-transform: uppercase; }
    .dir-a .corner { position: absolute; bottom: 32px; left: 40px; font-size: 11px; letter-spacing: 0.15em; color: rgba(13,13,13,0.3); }

    /* Direction B: Spatial Grid */
    .dir-b { background: #fafaf8; position: relative; }
    .dir-b .grid-lines { position: absolute; inset: 0; }
    .dir-b .grid-lines line { stroke: rgba(13,13,13,0.06); stroke-width: 1; }
    .dir-b .brand { position: absolute; left: 8.33%; top: 50%; transform: translateY(-50%); font-family: 'Noto Serif SC', serif; font-size: clamp(48px, 8vw, 120px); font-weight: 700; line-height: 1; writing-mode: vertical-rl; letter-spacing: 0.15em; }
    .dir-b .brand span { display: block; }
    .dir-b .brand span:nth-child(2) { color: #c23a2e; }
    .dir-b .info { position: absolute; right: 8.33%; bottom: 8.33%; text-align: right; font-size: 11px; letter-spacing: 0.12em; color: rgba(13,13,13,0.35); line-height: 2.2; }
    .dir-b .accent-line { position: absolute; left: 8.33%; bottom: 8.33%; width: 60px; height: 1px; background: #c23a2e; }

    /* Direction C: The Void & The Mark */
    .dir-c { background: #fafaf8; display: flex; flex-direction: column; justify-content: space-between; padding: 48px 56px; }
    .dir-c .top { display: flex; justify-content: space-between; align-items: flex-start; }
    .dir-c .logo { font-family: 'Noto Serif SC', serif; font-size: 15px; letter-spacing: 0.2em; }
    .dir-c .nav { display: flex; gap: 32px; font-size: 11px; letter-spacing: 0.15em; color: rgba(13,13,13,0.4); }
    .dir-c .center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
    .dir-c .mark { width: 280px; height: 280px; border: 1px solid rgba(13,13,13,0.08); border-radius: 50%; position: relative; animation: drift 20s ease-in-out infinite alternate; }
    .dir-c .mark::before { content: ''; position: absolute; inset: 40px; border: 1px solid rgba(13,13,13,0.06); border-radius: 50%; }
    .dir-c .mark::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: #c23a2e; border-radius: 50%; opacity: 0.5; }
    .dir-c .center-text { position: absolute; left: 50%; top: calc(50% + 170px); transform: translateX(-50%); text-align: center; }
    .dir-c .center-text .name { font-family: 'Noto Serif SC', serif; font-size: 14px; letter-spacing: 0.4em; }
    .dir-c .center-text .tag { margin-top: 12px; font-size: 10px; letter-spacing: 0.2em; color: rgba(13,13,13,0.35); }
    .dir-c .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .dir-c .bottom-left { font-size: 10px; letter-spacing: 0.1em; color: rgba(13,13,13,0.3); }
    .dir-c .bottom-right { font-size: 10px; letter-spacing: 0.1em; color: rgba(13,13,13,0.3); }
    @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(12px, 8px); } }
  </style>
</head>
<body>
  <div class="compare">
    <div class="label">方向 A — 字体纪念碑 · 品牌名即全部</div>
    <div class="frame dir-a">
      <div class="brand"><span class="solid">几里</span><span class="outline">造物</span></div>
      <div class="tagline">让文化成为空间资产</div>
      <div class="corner">湖南 / 长沙</div>
    </div>

    <div class="label">方向 B — 空间网格 · 理性秩序</div>
    <div class="frame dir-b">
      <svg class="grid-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
        <line x1="8.33" y1="0" x2="8.33" y2="100"/>
        <line x1="25" y1="0" x2="25" y2="100"/>
        <line x1="41.66" y1="0" x2="41.66" y2="100"/>
        <line x1="58.33" y1="0" x2="58.33" y2="100"/>
        <line x1="75" y1="0" x2="75" y2="100"/>
        <line x1="91.66" y1="0" x2="91.66" y2="100"/>
        <line x1="0" y1="16.66" x2="100" y2="16.66"/>
        <line x1="0" y1="33.33" x2="100" y2="33.33"/>
        <line x1="0" y1="50" x2="100" y2="50"/>
        <line x1="0" y1="66.66" x2="100" y2="66.66"/>
        <line x1="0" y1="83.33" x2="100" y2="83.33"/>
      </svg>
      <div class="brand"><span>几里</span><span>造物</span></div>
      <div class="accent-line"></div>
      <div class="info">
        文旅空间升级改造<br>
        空间设计与场景叙事<br>
        文创产品开发设计<br>
        文化提炼与系统设计<br><br>
        让文化成为空间资产
      </div>
    </div>

    <div class="label">方向 C — 空白与印记 · 东方留白</div>
    <div class="frame dir-c">
      <div class="top">
        <div class="logo">几里造物</div>
        <div class="nav">业务 · 方法 · 诊断 · 联系</div>
      </div>
      <div class="center">
        <div class="mark"></div>
        <div class="center-text">
          <div class="name">几里造物</div>
          <div class="tag">让文化成为空间资产</div>
        </div>
      </div>
      <div class="bottom">
        <div class="bottom-left">湖南 / 长沙</div>
        <div class="bottom-right">SPATIAL RENEWAL / CULTURAL SYSTEMS</div>
      </div>
    </div>
  </div>
</body>
</html>
